<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>Leitor de Notas</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <meta
      property="og:image"
      itemprop="image"
      content="https://leitordenotas.com.br/assets/logo.png"
    />
    <meta
      property="og:image:secure_url"
      itemprop="image"
      content="https://leitordenotas.com.br/assets/logo.png"
    />
    <meta
      name="description"
      content="Exporte o conteúdo de suas Notas de Corretagem para o Excel. Leitura gratuita de suas notas de corretagem."
    />
  </head>

  <body>
    <script>
      (function () {
        var mode = localStorage.getItem('theme-preference') || 'system';
        var dark =
          mode === 'dark' || (mode === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) {
          document.documentElement.setAttribute('data-bs-theme', 'dark');
          document.documentElement.classList.add('dark-theme');
        }
      })();
    </script>
    <app-root></app-root>
  </body>
</html>
